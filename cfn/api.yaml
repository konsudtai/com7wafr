AWSTemplateFormatVersion: '2010-09-09'
Description: WA Review Tool - API (API Gateway + Lambda + WAF + CORS)
Parameters:
  UserPoolArn:
    Type: String
  TableName:
    Type: String
  TableArn:
    Type: String
  UserPoolId:
    Type: String
  S3BucketName:
    Type: String
    Description: S3 bucket containing Lambda code
  LambdaCodeKey:
    Type: String
    Default: lambda/handlers.zip

Resources:
  # Lambda Execution Role
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: wa-review-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:PutItem, dynamodb:UpdateItem, dynamodb:DeleteItem, dynamodb:Query, dynamodb:Scan]
                Resource:
                  - !Ref TableArn
                  - !Sub '${TableArn}/index/*'
        - PolicyName: STSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: 'arn:aws:iam::*:role/WAReviewReadOnly'
        - PolicyName: LambdaSelfInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:wa-review-scan-handler'
        - PolicyName: ScanServiceAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:Describe*
                  - s3:ListBuckets
                  - s3:GetBucketEncryption
                  - s3:GetPublicAccessBlock
                  - rds:DescribeDBInstances
                  - iam:ListUsers
                  - iam:ListMFADevices
                  - lambda:ListFunctions
                  - dynamodb:ListTables
                  - dynamodb:DescribeTable
                  - elasticloadbalancing:Describe*
                  - cloudfront:List*
                  - ecs:ListClusters
                  - ecs:DescribeClusters
                  - eks:ListClusters
                  - eks:DescribeCluster
                  - cloudtrail:DescribeTrails
                  - cloudtrail:GetTrailStatus
                  - cloudtrail:LookupEvents
                  - logs:DescribeLogGroups
                  - config:DescribeConfigurationRecorders
                  - config:DescribeConfigurationRecorderStatus
                  - kms:ListKeys
                  - kms:DescribeKey
                  - kms:GetKeyRotationStatus
                  - ec2:DescribeVpcs
                  - ec2:DescribeFlowLogs
                  - ec2:DescribeSecurityGroups
                  - apigateway:GET
                  - sqs:ListQueues
                  - sqs:GetQueueAttributes
                  - es:ListDomainNames
                  - es:DescribeDomain
                  - guardduty:ListDetectors
                  - guardduty:GetDetector
                  - elasticfilesystem:DescribeFileSystems
                  - elasticache:DescribeCacheClusters
                  - redshift:DescribeClusters
                  - compute-optimizer:GetEC2InstanceRecommendations
                  - compute-optimizer:GetLambdaFunctionRecommendations
                  - compute-optimizer:GetEBSVolumeRecommendations
                Resource: '*'
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [cognito-idp:AdminCreateUser, cognito-idp:AdminDeleteUser, cognito-idp:AdminUpdateUserAttributes, cognito-idp:AdminUserGlobalSignOut, cognito-idp:ListUsers]
                Resource: !Ref UserPoolArn
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [bedrock:InvokeModel, bedrock:InvokeModelWithResponseStream]
                Resource:
                  - 'arn:aws:bedrock:*::foundation-model/*'
                  - 'arn:aws:bedrock:*:*:inference-profile/*'

  # Lambda Functions
  ScanHandler:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: wa-review-scan-handler
      Runtime: nodejs20.x
      Handler: dist/handlers/scan-handler.handler
      Code:
        S3Bucket: !Ref S3BucketName
        S3Key: !Ref LambdaCodeKey
      MemorySize: 1024
      Timeout: 900
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
          USER_POOL_ID: !Ref UserPoolId

  AccountHandler:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: wa-review-account-handler
      Runtime: nodejs20.x
      Handler: dist/handlers/account-handler.handler
      Code:
        S3Bucket: !Ref S3BucketName
        S3Key: !Ref LambdaCodeKey
      MemorySize: 256
      Timeout: 60
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
          USER_POOL_ID: !Ref UserPoolId

  TeamHandler:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: wa-review-team-handler
      Runtime: nodejs20.x
      Handler: dist/handlers/team-handler.handler
      Code:
        S3Bucket: !Ref S3BucketName
        S3Key: !Ref LambdaCodeKey
      MemorySize: 256
      Timeout: 60
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
          USER_POOL_ID: !Ref UserPoolId

  AIHandler:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: wa-review-ai-handler
      Runtime: nodejs20.x
      Handler: dist/handlers/ai-handler.handler
      Code:
        S3Bucket: !Ref S3BucketName
        S3Key: !Ref LambdaCodeKey
      MemorySize: 512
      Timeout: 120
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
          USER_POOL_ID: !Ref UserPoolId
          BEDROCK_REGION: us-east-1

  # API Gateway
  Api:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: wa-review-api

  # CORS Gateway Responses — ensures CORS headers on ALL error responses
  # including preflight failures and missing routes
  GatewayResponseDefault4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref Api
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"

  GatewayResponseDefault5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref Api
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"

  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: wa-review-cognito
      RestApiId: !Ref Api
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs: [!Ref UserPoolArn]

  # ============================================================
  # /scans
  # ============================================================
  ScansResource:
    Type: AWS::ApiGateway::Resource
    Properties: {RestApiId: !Ref Api, ParentId: !GetAtt Api.RootResourceId, PathPart: scans}

  ScansOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref Api
      ResourceId: !Ref ScansResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ScansPost:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref Api
      ResourceId: !Ref ScansResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ScanHandler.Arn}/invocations'

  ScansGet:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref Api
      ResourceId: !Ref ScansResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ScanHandler.Arn}/invocations'

  # /scans/{id}
  ScanIdResource:
    Type: AWS::ApiGateway::Resource
    Properties: {RestApiId: !Ref Api, ParentId: !Ref ScansResource, PathPart: '{id}'}

  # /scans/{id}/status
