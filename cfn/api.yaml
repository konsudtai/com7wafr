      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'DELETE,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  TeamMemberEmailDelete:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref Api
      ResourceId: !Ref TeamMemberEmailResource
      HttpMethod: DELETE
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TeamHandler.Arn}/invocations'

  # /team/members/{email}/role
  TeamMemberEmailRoleResource:
    Type: AWS::ApiGateway::Resource
    Properties: {RestApiId: !Ref Api, ParentId: !Ref TeamMemberEmailResource, PathPart: role}

  TeamMemberEmailRoleOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref Api
      ResourceId: !Ref TeamMemberEmailRoleResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'PUT,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  TeamMemberEmailRolePut:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref Api
      ResourceId: !Ref TeamMemberEmailRoleResource
      HttpMethod: PUT
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TeamHandler.Arn}/invocations'

  # ============================================================
  # Lambda Permissions
  # ============================================================
  ScanPermission:
    Type: AWS::Lambda::Permission
    Properties: {FunctionName: !Ref ScanHandler, Action: lambda:InvokeFunction, Principal: apigateway.amazonaws.com, SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*'}

  AccountPermission:
    Type: AWS::Lambda::Permission
    Properties: {FunctionName: !Ref AccountHandler, Action: lambda:InvokeFunction, Principal: apigateway.amazonaws.com, SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*'}

  TeamPermission:
    Type: AWS::Lambda::Permission
    Properties: {FunctionName: !Ref TeamHandler, Action: lambda:InvokeFunction, Principal: apigateway.amazonaws.com, SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*'}

  # ============================================================
  # Deployment — logical ID includes version suffix to force
  # CloudFormation to create a new deployment on every update.
  # Bump the suffix (v2, v3, ...) whenever API routes change.
  # ============================================================
  ApiDeploymentV5:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - GatewayResponseDefault4XX
      - GatewayResponseDefault5XX
      - ScansOptions
      - ScansPost
      - ScansGet
      - ScanIdStatusOptions
      - ScanIdStatusGet
      - ScanIdResultsOptions
      - ScanIdResultsGet
      - InvestigateOptions
      - InvestigatePost
      - AIChatOptions
      - AIChatPost
      - AIExecuteOptions
      - AIExecutePost
      - AccountsOptions
      - AccountsPost
      - AccountsGet
      - AccountIdOptions
      - AccountIdPut
      - AccountIdDelete
      - AccountIdVerifyOptions
      - AccountIdVerifyPost
      - TeamMembersOptions
      - TeamMembersPost
      - TeamMembersGet
      - TeamMemberEmailOptions
      - TeamMemberEmailDelete
      - TeamMemberEmailRoleOptions
      - TeamMemberEmailRolePut
    Properties:
      RestApiId: !Ref Api

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref Api
      DeploymentId: !Ref ApiDeploymentV5
      StageName: prod

  # ============================================================
  # WAF
  # ============================================================
  WebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: wa-review-api-waf
      Scope: REGIONAL
      DefaultAction: {Allow: {}}
      VisibilityConfig: {CloudWatchMetricsEnabled: true, MetricName: wa-review-waf, SampledRequestsEnabled: true}
      Rules:
        - Name: CommonRuleSet
          Priority: 1
          OverrideAction: {None: {}}
          Statement:
            ManagedRuleGroupStatement: {VendorName: AWS, Name: AWSManagedRulesCommonRuleSet}
          VisibilityConfig: {CloudWatchMetricsEnabled: true, MetricName: CommonRuleSet, SampledRequestsEnabled: true}
        - Name: RateLimit
          Priority: 2
          Action: {Block: {}}
          Statement:
            RateBasedStatement: {Limit: 1000, AggregateKeyType: IP}
          VisibilityConfig: {CloudWatchMetricsEnabled: true, MetricName: RateLimit, SampledRequestsEnabled: true}

  WebACLAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Sub 'arn:aws:apigateway:${AWS::Region}::/restapis/${Api}/stages/${ApiStage}'
      WebACLArn: !GetAtt WebACL.Arn

Outputs:
  ApiUrl:
    Value: !Sub 'https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export: {Name: WAReview-ApiUrl}
