AWSTemplateFormatVersion: '2010-09-09'
Description: WA Review Tool - Auth (Cognito User Pool + MFA)
Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: wa-review-user-pool
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      MfaConfiguration: 'ON'
      EnabledMfas: [SOFTWARE_TOKEN_MFA]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - {Name: email, AttributeDataType: String, Required: true, Mutable: true}
        - {Name: role, AttributeDataType: String, Required: false, Mutable: true}
      AccountRecoverySetting:
        RecoveryMechanisms: [{Name: verified_email, Priority: 1}]
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: wa-review-client
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows: [ALLOW_USER_PASSWORD_AUTH, ALLOW_USER_SRP_AUTH, ALLOW_REFRESH_TOKEN_AUTH]
      PreventUserExistenceErrors: ENABLED
      IdTokenValidity: 60
      AccessTokenValidity: 60
      RefreshTokenValidity: 43200
      TokenValidityUnits: {IdToken: minutes, AccessToken: minutes, RefreshToken: minutes}
Outputs:
  UserPoolId:
    Value: !Ref UserPool
    Export: {Name: WAReview-UserPoolId}
  UserPoolArn:
    Value: !GetAtt UserPool.Arn
    Export: {Name: WAReview-UserPoolArn}
  UserPoolClientId:
    Value: !Ref UserPoolClient
    Export: {Name: WAReview-UserPoolClientId}
